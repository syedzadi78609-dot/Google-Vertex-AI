<!DOCTYPE html>
<html>
<head>
    <title>Atelier - Wisdom Vault 🏛️</title>
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Quicksand', sans-serif; box-sizing: border-box; }
        body { background: #fff0f3; margin: 0; padding: 40px; min-height: 100vh; overflow-x: hidden; }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Grand Hotel'; color: #ff8fa3; font-size: 4rem; margin: 0; }
        
        /* --- THE GRID --- */
        .vault-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- THE FLASHCARD (Preview Mode) --- */
        .art-card {
            background: white;
            border: 4px solid black;
            border-radius: 25px;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 8px 8px 0px #ffcad4;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative; /* Keeps PFP anchored */
        }

        .art-card:hover { transform: translateY(-10px) rotate(2deg); box-shadow: 12px 12px 0px #ff8fa3; }

        .card-thumb {
            width: 100%;
            height: 200px;
            background: #ffe5ec;
            border: 3px solid black;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

        /* CIRCULAR SENSEI FACE (Bottom Right) */
        .sensei-face-mini {
            position: absolute;
            bottom: -15px;
            right: -15px;
            width: 60px;
            height: 60px;
            background: white;
            border: 4px solid black;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 4px 4px 0px #ffcad4;
            z-index: 2;
        }
        .sensei-face-mini img { width: 100%; height: 100%; object-fit: cover; }

        .card-date { font-weight: bold; font-size: 0.95rem; color: #555; margin-top: 5px; }

        /* --- THE EXPANSION OVERLAY --- */
        #vault-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 240, 243, 0.98);
            z-index: 1000;
            display: none;
            padding: 30px;
            overflow-y: auto;
        }

        .overlay-content {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        /* FULL SENSEI BODY (Top of Expansion) */
        .sensei-full-reveal {
            width: 250px;
            height: 250px;
            margin-bottom: 10px;
        }
        .sensei-full-reveal img { width: 100%; height: 100%; object-fit: contain; }

        .conversation-container {
            width: 100%;
            background: white;
            border: 5px solid black;
            border-radius: 35px;
            padding: 40px;
            box-shadow: 15px 15px 0px black;
            display: flex;
            gap: 30px;
        }

        .expanded-art { flex: 1; border: 4px solid black; border-radius: 20px; overflow: hidden; height: fit-content; }
        .expanded-art img { width: 100%; display: block; }

        .expanded-chat { flex: 1.2; display: flex; flex-direction: column; gap: 15px; }
        
        .chat-bubble { padding: 18px; border-radius: 22px; border: 3px solid black; line-height: 1.5; font-size: 1rem; position: relative; }
        .user-b { background: #ff8fa3; color: white; align-self: flex-end; box-shadow: 4px 4px 0px #ffcad4; }
        .sensei-b { background: #f1f1f1; align-self: flex-start; box-shadow: 4px 4px 0px #ddd; }

        .close-btn { 
            position: fixed; top: 20px; right: 40px; font-size: 3.5rem; 
            cursor: pointer; font-weight: bold; transition: 0.2s; z-index: 1100;
        }
        .close-btn:hover { color: #ff8fa3; transform: scale(1.1); }

        .back-home {
            display: inline-block; margin-bottom: 20px; text-decoration: none;
            color: black; font-weight: bold; background: white;
            padding: 12px 25px; border: 3px solid black; border-radius: 50px;
            box-shadow: 4px 4px 0px #ffcad4;
        }
    </style>
</head>
<body>

    <a href="{{ url_for('critique_room') }}" class="back-home">← Back to Studio</a>

    <div class="header">
        <h1>Wisdom Vault</h1>
        <p>Your journey from Student to Master, archived forever. ✨</p>
    </div>

    <div class="vault-grid">
        {% for item in critiques %}
        <div class="art-card" onclick="openVault('{{ item.image_url }}', '{{ item.user_prompt }}', '{{ item.sensei_response }}', '{{ item.date_created.strftime('%B %d, %Y') }}')">
            <div class="card-thumb">
                <img src="{{ item.image_url }}">
            </div>
            
            <div class="sensei-face-mini">
                <img src="/static/images/sensei_face.png"> </div>

            <div class="card-date">{{ item.date_created.strftime('%b %d') }}</div>
            <div class="card-rank" style="font-weight: bold;">MASTERPIECE SECURED</div>
        </div>
        {% endfor %}
    </div>

    <div id="vault-overlay">
        <span class="close-btn" onclick="closeVault()">&times;</span>
        
        <div class="overlay-content">
            <div class="sensei-full-reveal">
                <img src="/static/images/sensei_body.png"> </div>

            <div class="conversation-container">
                <div class="expanded-art">
                    <img id="modal-img" src="">
                </div>
                <div class="expanded-chat">
                    <h2 id="modal-date" style="margin-top:0; color:#ff8fa3; border-bottom: 3px solid #ffcad4; padding-bottom: 10px;">Date</h2>
                    
                    <div style="font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 5px;">You asked:</div>
                    <div class="chat-bubble user-b" id="modal-user-msg">Prompt...</div>
                    
                    <div style="font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-top: 15px; margin-bottom: 5px;">Sensei's Verdict:</div>
                    <div class="chat-bubble sensei-b" id="modal-sensei-msg">Wisdom...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openVault(img, prompt, feedback, date) {
            document.getElementById('modal-img').src = img;
            document.getElementById('modal-user-msg').innerText = prompt;
            document.getElementById('modal-sensei-msg').innerText = feedback;
            document.getElementById('modal-date').innerText = date;
            
            document.getElementById('vault-overlay').style.display = 'block';
            document.body.style.overflow = 'hidden'; 
        }

        function closeVault() {
            document.getElementById('vault-overlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
