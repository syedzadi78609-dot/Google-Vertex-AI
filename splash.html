<div id="splash" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f3bcc2; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.8s;">
    <img src="{{ url_for('static', filename='logo.jpg') }}" id="logo" style="width: 250px; transition: transform 1.5s ease-in-out;">
</div>

<script>
    window.onload = () => {
        document.getElementById('logo').style.transform = 'scale(1.3) rotate(5deg)';
        setTimeout(() => {
            document.getElementById('splash').style.opacity = '0';
            setTimeout(() => {
                window.location.href = "{{ url_for('login_logic') }}";
            }, 800);
        }, 2200);
    };
</script>
